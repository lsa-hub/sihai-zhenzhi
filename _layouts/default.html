<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      background:#0a0a0a;
      color:#e8e0d0;
      line-height:1.5;
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    /* ===== BLACK-GOLD THEME ===== */
    :root{
      --gold:#c9a030;
      --gold-light:#e8c96a;
      --gold-dark:#8b6914;
      --gold-dim:rgba(201,160,48,0.15);
      --gold-border:rgba(201,160,48,0.12);
      --surface:rgba(30,28,22,0.6);
      --text-primary:#e8e0d0;
      --text-secondary:#9a8e78;
    }

    /* NAVBAR */
    .nav{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      background:rgba(10,10,10,0.82);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      border-bottom:1px solid rgba(201,160,48,0.1);
      padding:0 2rem;
      display:flex;align-items:center;justify-content:space-between;
      height:48px;transition:background 0.4s;
    }
    .nav .logo{font-size:1rem;font-weight:600;color:var(--gold-light);text-decoration:none;letter-spacing:-0.02em;}
    .nav .logo span{color:var(--text-secondary);font-weight:400;font-size:0.85rem;margin-left:0.6rem;}
    .nav .gh-link{font-size:0.78rem;color:var(--text-secondary);text-decoration:none;padding:0.3rem 0.8rem;border-radius:20px;border:1px solid rgba(201,160,48,0.2);transition:all 0.3s;}
    .nav .gh-link:hover{color:var(--gold-light);border-color:var(--gold);background:rgba(201,160,48,0.08);}

    /* HERO */
    .hero{
      min-height:85vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      text-align:center;padding:6rem 2rem 4rem;position:relative;
      background:radial-gradient(ellipse at 50% 0%, #1e1c15 0%, #0a0a0a 70%);
    }
    .hero::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:200px;
      background:linear-gradient(to bottom,transparent,#0a0a0a);pointer-events:none;
    }
    .hero .tag{
      font-size:0.7rem;font-weight:600;letter-spacing:0.2em;color:var(--gold);
      text-transform:uppercase;
      opacity:0;animation:fadeUp 0.8s 0.1s forwards;
    }
    .hero h1{
      font-size:clamp(2.5rem,8vw,5rem);font-weight:700;letter-spacing:-0.03em;margin:0.5rem 0;
      background:linear-gradient(180deg,#f0d78c 0%,#c9a030 40%,#8b6914 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      opacity:0;animation:fadeUp 0.8s 0.2s forwards;
    }
    .hero .subtitle{
      font-size:clamp(1rem,2.5vw,1.4rem);color:var(--text-secondary);font-weight:400;max-width:500px;
      opacity:0;animation:fadeUp 0.8s 0.35s forwards;
    }
    .hero .stats{display:flex;gap:3rem;margin-top:2.5rem;opacity:0;animation:fadeUp 0.8s 0.5s forwards;}
    .hero .stat{text-align:center;}
    .hero .stat-num{font-size:2.5rem;font-weight:700;color:var(--gold-light);font-variant-numeric:tabular-nums;}
    .hero .stat-label{font-size:0.7rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.15em;margin-top:0.3rem;}
    .hero .scroll-hint{position:absolute;bottom:3rem;left:50%;transform:translateX(-50%);opacity:0;animation:fadeUp 0.8s 0.7s forwards;}
    .scroll-hint .mouse{width:26px;height:40px;border:2px solid rgba(201,160,48,0.4);border-radius:14px;position:relative;margin:0 auto 0.5rem;}
    .scroll-hint .mouse::after{
      content:'';width:4px;height:8px;background:var(--gold);border-radius:2px;
      position:absolute;top:6px;left:50%;transform:translateX(-50%);animation:scrollWheel 1.5s infinite;
    }
    .scroll-hint span{font-size:0.65rem;color:var(--text-secondary);letter-spacing:0.1em;}

    /* CONTAINER */
    .container{max-width:1100px;margin:0 auto;padding:0 2rem;}

    /* SECTIONS */
    .section{padding:5rem 0;position:relative;}
    .section-alt{background:rgba(30,28,22,0.3);}
    .section-label{font-size:0.7rem;font-weight:700;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:0.5rem;}
    .section-title{
      font-size:clamp(2rem,5vw,3rem);font-weight:700;letter-spacing:-0.03em;text-align:center;margin-bottom:3rem;
      background:linear-gradient(180deg,var(--gold-light) 0%,var(--gold) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* BRAND CARDS */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.2rem;}
    .card{
      background:var(--surface);border:1px solid var(--gold-border);border-radius:20px;
      padding:2rem;text-decoration:none;color:inherit;position:relative;overflow:hidden;
      transition:all 0.5s cubic-bezier(0.16,1,0.3,1);cursor:pointer;
    }
    .card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      opacity:0;transition:opacity 0.5s;
    }
    .card:hover{background:rgba(40,35,25,0.7);border-color:rgba(201,160,48,0.3);transform:translateY(-4px);box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 30px rgba(201,160,48,0.05);}
    .card:hover::before{opacity:1;}

    .card .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.6rem;}
    .card .brand-name{font-size:1.3rem;font-weight:600;color:var(--text-primary);letter-spacing:-0.02em;}
    .card .brand-name small{font-weight:400;color:var(--text-secondary);font-size:0.75rem;}
    .card .price{font-size:0.78rem;font-weight:600;color:var(--gold-light);background:var(--gold-dim);padding:0.2rem 0.7rem;border-radius:20px;white-space:nowrap;}
    .card .desc{color:var(--text-secondary);font-size:0.9rem;margin-bottom:0.8rem;}
    .card .tags{display:flex;flex-wrap:wrap;gap:0.4rem;}
    .card .tags span{font-size:0.7rem;color:var(--text-secondary);background:rgba(201,160,48,0.06);border:1px solid rgba(201,160,48,0.08);padding:0.18rem 0.6rem;border-radius:6px;transition:all 0.3s;}
    .card:hover .tags span{background:rgba(201,160,48,0.12);border-color:rgba(201,160,48,0.2);color:#c9b980;}

    /* DETAIL PAGES */
    .detail-hero{background:radial-gradient(ellipse at 50% 30%,#1e1c15 0%,#0a0a0a 70%);padding:8rem 2rem 3rem;text-align:center;}
    .detail-hero .back{color:var(--gold);font-size:0.9rem;text-decoration:none;display:inline-block;margin-bottom:2rem;transition:all 0.3s;}
    .detail-hero .back:hover{color:var(--gold-light);transform:translateX(-4px);}
    .detail-hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:700;letter-spacing:-0.03em;}

    .detail-card{background:var(--surface);border:1px solid var(--gold-border);border-radius:20px;padding:2rem;margin:2rem 0;}
    .detail-card h3{font-size:1.4rem;font-weight:600;color:var(--gold-light);margin:2rem 0 0.6rem;padding-top:1.5rem;border-top:1px solid var(--gold-border);letter-spacing:-0.02em;}
    .detail-card h3:first-of-type{border-top:none;padding-top:0;margin-top:0;}
    .detail-card ul{list-style:none;padding:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:0.3rem 1rem;}
    .detail-card ul li{padding:0.35rem 0;color:#a09880;font-size:0.9rem;}
    .detail-card ul li::before{content:'› ';color:var(--gold);}
    .detail-card table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:0.85rem;}
    .detail-card table th{text-align:left;color:var(--text-secondary);font-weight:500;padding:0.3rem 0.8rem 0.3rem 0;border-bottom:1px solid var(--gold-border);width:80px;white-space:nowrap;}
    .detail-card table td{padding:0.3rem 0;border-bottom:1px solid rgba(201,160,48,0.06);color:#a09880;}
    .detail-card p strong{color:var(--text-primary);}

    .quote-box{
      background:linear-gradient(135deg,var(--gold-dim),rgba(201,160,48,0.03));
      border:1px solid rgba(201,160,48,0.2);border-radius:16px;padding:1.5rem;
      margin:1.5rem 0;font-size:1.1rem;font-weight:500;color:var(--gold-light);text-align:center;position:relative;
    }
    .quote-box::before{content:'"';font-size:4rem;color:rgba(201,160,48,0.12);position:absolute;top:-0.5rem;left:1rem;line-height:1;}

    /* FOOTER */
    .footer{text-align:center;padding:3rem 2rem;color:var(--text-secondary);font-size:0.78rem;border-top:1px solid var(--gold-border);}
    .footer a{color:var(--gold);text-decoration:none;}

    /* ===== ANIMATIONS (CSS keyframes — replay every time class added) ===== */
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scrollWheel{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(16px)}}

    /* Reveal: hidden until .visible triggers the animation */
    .reveal{opacity:0;transform:translateY(40px);}
    .reveal.visible{animation:revealIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;}
    @keyframes revealIn{to{opacity:1;transform:translateY(0)}}

    .card-reveal{opacity:0;transform:translateY(50px);}
    .card-reveal.visible{animation:cardIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;}
    @keyframes cardIn{to{opacity:1;transform:translateY(0)}}

    @media (max-width:640px){
      .nav{padding:0 1rem}
      .hero h1{font-size:2.2rem}
      .hero .stats{gap:1.5rem}
      .hero .stat-num{font-size:1.8rem}
      .card-grid{grid-template-columns:1fr}
      .section{padding:3rem 0}
    }
  </style>
</head>
<body>
  {% if page.type == "detail" %}
  <nav class="nav">
    <a href="/sihai-zhenzhi/" class="logo">四海针织<span>品牌参数</span></a>
    <a href="https://github.com/lsa-hub/sihai-zhenzhi" class="gh-link">GitHub</a>
  </nav>

  <div class="detail-hero">
    <div class="container">
      <a href="/sihai-zhenzhi/" class="back">← 返回</a>
      <h1>{{ page.title }}</h1>
    </div>
  </div>
  <main class="container">
    {{ content }}
  </main>
  {% else %}

  <nav class="nav">
    <a href="/sihai-zhenzhi/" class="logo">四海针织<span>品牌参数</span></a>
    <a href="https://github.com/lsa-hub/sihai-zhenzhi" class="gh-link">GitHub</a>
  </nav>

  <section class="hero">
    <div class="tag">Sihai Zhenzhi</div>
    <h1>品牌参数库</h1>
    <p class="subtitle">针织批发店在售内衣/袜子品牌<br>产品参数、卖点与客群数据</p>
    <div class="stats">
      <div class="stat"><div class="stat-num" data-count="20">0</div><div class="stat-label">品牌</div></div>
      <div class="stat"><div class="stat-num" data-count="6">0</div><div class="stat-label">品类</div></div>
      <div class="stat"><div class="stat-num">∞</div><div class="stat-label">持续更新</div></div>
    </div>
    <div class="scroll-hint">
      <div class="mouse"></div>
      <span>向下滚动</span>
    </div>
  </section>

  <main>
    {{ content }}
  </main>
  {% endif %}

  <footer class="footer">
    四海针织 &copy; {{ site.time | date: '%Y' }} · Powered by <a href="https://github.com/lsa-hub/sihai-zhenzhi">GitHub</a>
  </footer>

  <script>
    // Count-up with rAF-based in-view detection
    const statEls=[...document.querySelectorAll('.stat-num[data-count]')];
    const statTimers=new Map();
    let statInView=new Set();

    function checkStats(){
      const vh=window.innerHeight;
      statEls.forEach(el=>{
        const r=el.getBoundingClientRect();
        const inView=r.top<vh*0.8&&r.bottom>0;
        if(inView&&!statInView.has(el)){
          statInView.add(el);
          const target=parseInt(el.dataset.count);
          el.textContent='0';
          let c=0;
          const step=Math.max(1,Math.floor(target/(1200/16)));
          if(statTimers.has(el))clearInterval(statTimers.get(el));
          const t=setInterval(()=>{c=Math.min(c+step,target);el.textContent=c;if(c>=target)clearInterval(t);},16);
          statTimers.set(el,t);
        }else if(!inView&&statInView.has(el)){
          statInView.delete(el);
          if(statTimers.has(el)){clearInterval(statTimers.get(el));statTimers.delete(el);}
          el.textContent='0';
        }
      });
    }

    // Reveal — scroll-based, forcibly replays animation
    const items=[...document.querySelectorAll('.reveal,.card-reveal')].map((el,i)=>{
      el.dataset.rvidx=i; el.style.animationDelay='0s';
      return el;
    });
    const visibleItems=new Set();

    function checkReveals(){
      const vh=window.innerHeight;
      const entering=[];
      items.forEach(el=>{
        const r=el.getBoundingClientRect();
        const inView=r.top<vh*0.82&&r.bottom>vh*0.05;
        if(inView&&!visibleItems.has(el)){
          visibleItems.add(el);
          entering.push(el);
        }else if(!inView&&visibleItems.has(el)){
          visibleItems.delete(el);
          el.classList.remove('visible');
        }
      });
      // Stagger entering items by index order
      entering.sort((a,b)=>parseInt(a.dataset.rvidx)-parseInt(b.dataset.rvidx));
      entering.forEach((el,i)=>{
        setTimeout(()=>{
          if(visibleItems.has(el)){
            el.classList.remove('visible');
            void el.offsetWidth;
            el.classList.add('visible');
          }
        },i*55);
      });
    }

    let ticking=false;
    function onScroll(){
      if(!ticking){
        requestAnimationFrame(()=>{
          checkStats();
          checkReveals();
          ticking=false;
        });
        ticking=true;
      }
    }
    window.addEventListener('scroll',onScroll,{passive:true});
    // initial check after layout
    requestAnimationFrame(()=>{checkStats();checkReveals();});
  </script>
</body>
</html>
